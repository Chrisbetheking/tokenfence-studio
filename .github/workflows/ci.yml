name: CI Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  source-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/source_guard.js

  frontend-build:
    needs: source-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: node scripts/source_guard.js
      - run: npm run build

  rust-tauri-check:
    needs: source-guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: cargo check
        working-directory: apps/desktop/src-tauri

  release-sanity:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run release sanity
        run: node scripts/release_sanity.js ${{ github.ref_name }}
