name: Chris Studio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: chris-studio-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  desktop-ui:
    name: Desktop UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - name: Install desktop UI dependencies
        run: npm install --prefix apps/desktop/ui --legacy-peer-deps --no-audit --no-fund
      - name: Verify required packages
        run: npm --prefix apps/desktop/ui ls @tauri-apps/api exceljs pdfjs-dist mammoth tesseract.js --depth=0
      - name: Type-check
        run: npm --prefix apps/desktop/ui run typecheck
      - name: Core privacy and token tests
        run: npm --prefix apps/desktop/ui run test:core
      - name: Production build
        run: npm --prefix apps/desktop/ui run build

  macos-native-check:
    name: macOS native Rust check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install desktop UI dependencies
        run: npm install --prefix apps/desktop/ui --legacy-peer-deps --no-audit --no-fund
      - name: Check Rust backend
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
