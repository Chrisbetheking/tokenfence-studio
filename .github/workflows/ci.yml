name: CI Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  source-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/source_guard.js

  release-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run release sanity (default check)
        run: node scripts/release_sanity.js v0.0.0-ci
        continue-on-error: true

  frontend-build:
    needs: source-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: node scripts/source_guard.js
      - run: npm run build
        continue-on-error: true

  rust-tauri-check:
    needs: source-guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: cargo check
        working-directory: apps/desktop/src-tauri

  # Tagged release sanity: runs full version check when a tag is pushed
  release-sanity-tagged:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run full release sanity
        run: node scripts/release_sanity.js 

  # Verify raw commit source integrity on tag
  verify-raw:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify raw commit sources
        run: node scripts/verify_raw_commit.js 
