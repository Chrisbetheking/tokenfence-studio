name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run build
      - name: Package web build
        run: |
          cd apps/web
          if [ -d ".next" ]; then
            tar -czf ../web-build.tar.gz .next
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-build
          path: apps/web-build.tar.gz

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: false
          packager: npm
      - run: npm ci --legacy-peer-deps
      - name: Build Android APK via EAS
        working-directory: apps/android
        run: |
          npx eas-cli build --platform android --profile preview-apk --non-interactive --wait --json > eas-build.json
          echo "EAS build completed. Output:"
          cat eas-build.json
      - name: Parse APK artifact URL
        working-directory: apps/android
        id: eas-artifact
        run: |
          ARTIFACT_URL=$(python3 -c "import json; d=json.load(open('eas-build.json')); d=d[0] if isinstance(d,list) else d; print(d.get('artifacts',{}).get('buildUrl',''))" 2>/dev/null)
          if [ -z "$ARTIFACT_URL" ]; then
            echo "ERROR: No APK artifact URL found in EAS build output"
            echo "Raw eas-build.json:"
            cat eas-build.json
            exit 1
          fi
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          echo "APK artifact URL: $ARTIFACT_URL"
      - name: Download APK from EAS
        working-directory: apps/android
        run: |
          ARTIFACT_URL="${{ steps.eas-artifact.outputs.artifact_url }}"
          APK_NAME="TokenFence-Mobile-Lite-Android-${{ github.ref_name }}.apk"
          curl -L -o "$APK_NAME" "$ARTIFACT_URL"
          echo "APK downloaded: $APK_NAME"
          ls -lh "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
        id: download-apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/android/TokenFence-Mobile-Lite-Android-*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-eas-info
          path: apps/android/eas-build.json

  desktop-windows:
    needs: [web-build]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-windows
          path: apps/desktop/src-tauri/target/release/bundle/

  desktop-macos:
    needs: [web-build]
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-macos
          path: apps/desktop/src-tauri/target/release/bundle/

  release:
    needs: [web-build, android-apk]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## TokenFence Studio ${{ github.ref_name }}

            ### Web
            Web build is available as a workflow artifact.

            ### Android
            Android APK is attached below (built via Expo EAS).
            EAS build dashboard: https://expo.dev/accounts/kevin_wong0712/projects/tokenfence-mobile/builds

            ### Desktop
            Windows/macOS desktop packages are experimental.
            See [docs/RELEASES.md](https://github.com/Chrisbetheking/tokenfence-studio/blob/main/docs/RELEASES.md) for build instructions.
          files: |
            android-apk/*.apk
            desktop-windows/**/*
            desktop-macos/**/*
            android-eas-info/eas-build.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
