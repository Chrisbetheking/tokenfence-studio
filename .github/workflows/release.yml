name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run build
      - name: Package web build
        run: |
          cd apps/web
          if [ -d ".next" ]; then
            tar -czf ../web-build.tar.gz .next
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-build
          path: apps/web-build.tar.gz

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: false
          packager: npm
      - run: npm ci --legacy-peer-deps
      - name: Submit EAS Android Build
        working-directory: apps/android
        run: |
          npx eas-cli build --platform android --profile preview-apk --non-interactive --no-wait --json > eas-build.json
          echo "EAS build submitted. Output:"
          cat eas-build.json
      - name: Extract EAS build URL
        working-directory: apps/android
        id: eas-info
        run: |
          BUILD_URL=$(python3 -c "import json,sys; d=json.load(open('eas-build.json')); print(d.get('buildUrl', d.get('artifacts',{}).get('buildUrl','https://expo.dev/accounts/kevin_wong0712/projects/tokenfence-mobile/builds')))" 2>/dev/null || echo "https://expo.dev/accounts/kevin_wong0712/projects/tokenfence-mobile/builds")
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "EAS Build URL: $BUILD_URL"
      - name: Create build info artifact
        working-directory: apps/android
        run: |
          echo "EAS build submitted for v0.3.8" > BUILD_INFO.txt
          echo "Expo Dashboard: https://expo.dev/accounts/kevin_wong0712/projects/tokenfence-mobile/builds" >> BUILD_INFO.txt
          echo "Build URL: ${{ steps.eas-info.outputs.build_url }}" >> BUILD_INFO.txt
      - uses: actions/upload-artifact@v4
        with:
          name: android-eas-info
          path: |
            apps/android/eas-build.json
            apps/android/BUILD_INFO.txt

  desktop-windows:
    needs: [web-build]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-windows
          path: apps/desktop/src-tauri/target/release/bundle/

  desktop-macos:
    needs: [web-build]
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-macos
          path: apps/desktop/src-tauri/target/release/bundle/

  release:
    needs: [web-build, android-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## TokenFence Studio ${{ github.ref_name }}

            ### Web
            Web build is available as a workflow artifact.

            ### Android
            Android APK is built via Expo EAS.
            Check build status: https://expo.dev/accounts/kevin_wong0712/projects/tokenfence-mobile/builds

            ### Desktop
            Windows/macOS desktop packages are experimental.
            See [docs/RELEASES.md](https://github.com/Chrisbetheking/tokenfence-studio/blob/main/docs/RELEASES.md) for build instructions.
          files: |
            desktop-windows/**/*
            desktop-macos/**/*
            android-eas-info/BUILD_INFO.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
