name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/out

  desktop-windows:
    needs: [web-build]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (Windows)
        shell: bash
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-windows
          path: apps/desktop/src-tauri/target/release/bundle/

  desktop-macos:
    needs: [web-build]
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: desktop-macos
          path: apps/desktop/src-tauri/target/release/bundle/

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci --legacy-peer-deps
      - name: Submit EAS Android Build
        working-directory: apps/android
        run: npx eas build --platform android --profile preview-apk --non-interactive --wait

  release:
    needs: [desktop-windows, desktop-macos, android-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            desktop-windows/**/*
            desktop-macos/**/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
