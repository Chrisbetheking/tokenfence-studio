name: TokenFence macOS Builds and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v1.6.1
        required: true
        default: v1.6.1
        type: string
      create_release:
        description: Create or update the GitHub Release
        required: true
        default: true
        type: boolean
      make_latest:
        description: Mark this release as latest
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: tokenfence-macos-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  verify-desktop-ui:
    name: Verify desktop UI and privacy boundary
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root workspace dependencies
        run: npm ci --legacy-peer-deps

      # apps/desktop/ui is nested below the apps/* workspace glob, so npm does
      # not install its own package.json dependencies during the root install.
      - name: Install desktop UI dependencies
        run: npm install --prefix apps/desktop/ui --legacy-peer-deps

      - name: Show effective desktop TypeScript configuration
        run: |
          node -e "const c=require('./apps/desktop/ui/tsconfig.json'); console.log(JSON.stringify(c,null,2)); if (!Array.isArray(c.include) || !c.include.includes('src/main.tsx') || c.include.includes('src')) process.exit(1)"

      - name: Type-check production desktop dependency graph
        run: npm --workspace apps/desktop run typecheck

      - name: Run core privacy tests
        run: npm --workspace apps/desktop run test:core

      - name: Build desktop UI
        run: npm --prefix apps/desktop/ui run build

  build-macos:
    name: macOS ${{ matrix.label }}
    needs: verify-desktop-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: Apple Silicon
            slug: Apple-Silicon
          - runner: macos-15-intel
            label: Intel
            slug: Intel
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install root workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install desktop UI dependencies
        run: npm install --prefix apps/desktop/ui --legacy-peer-deps

      - name: Verify desktop TypeScript before native build
        run: npm --workspace apps/desktop run typecheck

      - name: Build Tauri application
        run: npm --workspace apps/desktop run build

      - name: Package DMG and APP ZIP
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          OUT_DIR="release/${{ matrix.slug }}"
          mkdir -p "$OUT_DIR"

          DMG_PATH="$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit 2>/dev/null || true)"
          APP_PATH="$(find "$BUNDLE_DIR/macos" -maxdepth 1 -type d -name '*.app' -print -quit 2>/dev/null || true)"

          if [[ -z "$DMG_PATH" ]]; then
            echo "No DMG was produced. Bundle contents:"
            find "$BUNDLE_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          if [[ -z "$APP_PATH" ]]; then
            echo "No .app bundle was produced. Bundle contents:"
            find "$BUNDLE_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          DMG_NAME="TokenFence-Studio-macOS-${{ matrix.slug }}.dmg"
          APP_ZIP_NAME="TokenFence-Studio-macOS-${{ matrix.slug }}.app.zip"

          cp "$DMG_PATH" "$OUT_DIR/$DMG_NAME"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_DIR/$APP_ZIP_NAME"

          (
            cd "$OUT_DIR"
            shasum -a 256 "$DMG_NAME" "$APP_ZIP_NAME" > "SHA256SUMS-${{ matrix.slug }}.txt"
          )

          ls -lah "$OUT_DIR"

      - name: Upload ${{ matrix.label }} packages
        uses: actions/upload-artifact@v4
        with:
          name: TokenFence-Studio-macOS-${{ matrix.slug }}
          path: release/${{ matrix.slug }}/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Create or update GitHub Release
    needs: build-macos
    if: ${{ inputs.create_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: TokenFence-Studio-macOS-*
          path: release
          merge-multiple: true

      - name: List release files
        run: find release -maxdepth 2 -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: TokenFence Studio ${{ inputs.version }}
          body: |
            ## TokenFence Studio ${{ inputs.version }}

            Native unsigned macOS packages for Apple Silicon and Intel Macs.

            ### Installation
            1. Download the package matching your Mac processor.
            2. Open the DMG and move TokenFence Studio to Applications.
            3. On first launch, if macOS blocks the unsigned build, right-click the app and choose **Open**.

            API credentials are user supplied. Do not use real secrets when testing the public demo.
          files: release/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: ${{ inputs.make_latest }}
