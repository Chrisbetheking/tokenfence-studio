[package]
name = "tokenfence-studio"
version = "1.0.14"
description = "TokenFence Studio Desktop App"
authors = ["TokenFence"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.0.14", features = [] }

[dependencies]
tauri = { version = "1.0.14", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1.0.14", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
ureq = { version = "1.0.14", features = ["json"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

